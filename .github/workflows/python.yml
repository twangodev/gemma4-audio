name: Python

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      limit:
        description: Samples per split
        type: number
        default: 15

jobs:
  benchmark:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - google/gemma-4-E2B-it
          - google/gemma-4-E4B-it
        dataset:
          - librispeech:test.clean
          - librispeech:test.other
          - ami:test
          - earnings22:test
          - gigaspeech:test
          - spgispeech:test
          - tedlium:test
          - voxpopuli:test
    env:
      HF_HUB_CACHE: /home/runner/.cache/huggingface/hub
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/huggingface/hub
          key: hf-model-${{ matrix.model }}

      - name: Install dependencies
        run: uv sync --extra transformers

      - name: Install CPU-only PyTorch
        run: uv pip install --reinstall torch torchvision torchcodec --torch-backend=cpu

      - name: Run benchmark (${{ matrix.model }} / ${{ matrix.dataset }})
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run --no-sync g4 eval \
            --model "${{ matrix.model }}" \
            --benchmark "${{ matrix.dataset }}" \
            --backend transformers \
            --streaming \
            --limit "${{ inputs.limit || 15 }}" \
            --output-json results.json \
            --output-csv results.csv

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-${{ strategy.job-index }}
          path: |
            results.json
            results.csv

  aggregate:
    needs: benchmark
    if: always() && needs.benchmark.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: all-results

      - name: Write summary table
        run: python scripts/aggregate_results.py all-results >> "$GITHUB_STEP_SUMMARY"